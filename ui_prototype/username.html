<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Choose Username</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="js/state.js"></script>
<script src="js/onboarding.js"></script>

<body>
    <header class="username-header">
        <nav>
            <a href="index.html" class="back-btn">← Back</a>
        </nav>
    </header>
    <main class="username-wrapper">

        <article class="username-card">

            <section class="username-title">
                <h1>Choose your username</h1>
                <p>Your unique identity on Placed</p>
            </section>

            <section class="username-form">
                <form action="field.html">

                    <input type="text" placeholder="your_username" required>

                    <small>
                        3–20 characters. Letters, numbers & underscores only.
                    </small>

                    <button type="submit">
                        Continue →
                    </button>
                </form>
            </section>
        </article>
        <aside class="step-indicator">
            Step 1
        </aside>
    </main>
    <footer></footer>
</body>

</html>

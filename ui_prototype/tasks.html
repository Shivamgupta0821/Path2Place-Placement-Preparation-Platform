<!DOCTYPE html>
<html>

<head>

<script src="js/state.js"></script>

<body style="margin:0; font-family:Arial, sans-serif; background:#0b0b0b; color:white;">

      <p style="color:#aaa; font-size:14px;">DSA Problem</p>

      <a href="dsa-editor.html" style="

   ">

      <p style="color:#aaa; font-size:14px;">Dev Problem</p>

        ▶ Start Task →

    </div>

  </div>

  <!-- Bottom Nav -->
  <div
    style="position:fixed; bottom:0; width:100%; background:#111; padding:12px 0; display:flex; justify-content:space-around; color:#aaa;">
    <div style="color:#facc15;">Today</div>
    <div>Progress</div>
    <div>Rank</div>
    <div>Profile</div>
  </div>

</body>

</html>
